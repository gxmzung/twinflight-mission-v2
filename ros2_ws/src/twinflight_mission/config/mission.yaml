mission_name: campus_facility_inspection_demo
description: "시설 점검용 자율비행 임무 시뮬레이션"

# ==========================================
# 작성일: 2026. 05. 06
# 작성자: 이영준
# 내용: PX4 좌표계 설정 (NED 방식)
#      - z가 음수(-)이면 위쪽(Up) 방향
# ==========================================

# PX4 uses North-East-Down (NED) coordinate system.
# Z-axis is negative for upward direction.
takeoff_altitude: 5.0

waypoints:
  - name: takeoff_hover
    x: 0.0
    y: 0.0
    z: -5.0
    yaw: 0.0
    hold_sec: 3

  - name: inspect_point_1
    x: 5.0
    y: 0.0
    z: -5.0
    yaw: 0.0
    hold_sec: 3

  - name: inspect_point_2
    x: 5.0
    y: 5.0
    z: -5.0
    yaw: 1.57
    hold_sec: 3

  - name: return_point
    x: 0.0
    y: 0.0
    z: -5.0
    yaw: 3.14
    hold_sec: 3
